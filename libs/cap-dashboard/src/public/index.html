<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CAP Dashboard — Demo UI</title>
    <link rel="stylesheet" href="/cap-dashboard/styles.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>CAP Dashboard (Demo)</h1>
        <nav>
          <button id="tab-outbox" class="active">Outbox</button>
          <button id="tab-inbox">Inbox</button>
        </nav>
      </header>

      <main>
        <section id="controls">
          <label>Topic: <input id="filter-topic" placeholder="topic" /></label>
          <label>Mode:
            <select id="filter-mode">
              <option value="all">All</option>
              <option value="due">Due (retry due)</option>
            </select>
          </label>
          <button id="btn-refresh">Refresh</button>
        </section>

        <section id="list-view">
          <div id="list"></div>
          <div id="pagination"></div>
        </section>

        <aside id="detail-view">
          <h2>Details</h2>
          <div id="detail"></div>
          <div id="detail-actions"></div>
        </aside>
      </main>

      <footer>
        <small>Demo UI — calls REST API at <code>/api/cap</code>. Admin actions may require authentication.</small>
      </footer>
    </div>

    <script src="/cap-dashboard/main.js" defer></script>
  </body>
</html>
