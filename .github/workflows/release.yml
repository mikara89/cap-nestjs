name: Release

on:
  workflow_dispatch:
    inputs:
      release_package:
        description: 'Normal release package (ignored during npm bootstrap)'
        required: true
        default: '@mikara89/cap-nest'
        type: choice
        options:
          - '@mikara89/cap-nest'
          - '@mikara89/cap-storage-mikro-orm'
          - '@mikara89/cap-transport-azure-servicebus'
          - '@mikara89/cap-transport-nestjs-microservices'
          - '@mikara89/cap-dashboard'
      bootstrap_npm:
        description: 'Publish all 14 current package versions to npmjs'
        required: true
        default: false
        type: boolean
      bootstrap_confirmation:
        description: 'For bootstrap only, enter PUBLISH_ALL_TO_NPM'
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: npm-release-${{ github.repository }}
  cancel-in-progress: false

env:
  NPM_REGISTRY_URL: https://registry.npmjs.org/

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Install npm with trusted publishing support
        run: npm install --global npm@11.5.1

      - name: Verify tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --package-lock=true

      - name: Verify release configuration
        run: node tools/verify-from-package-candidates.js --verify

      - name: Enumerate npmjs versions and verify candidates
        env:
          RELEASE_PACKAGE: ${{ inputs.release_package }}
          BOOTSTRAP_NPM: ${{ inputs.bootstrap_npm }}
          BOOTSTRAP_CONFIRMATION: ${{ inputs.bootstrap_confirmation }}
        run: node tools/verify-from-package-candidates.js --plan

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Lint
        run: npm run lint:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --runInBand

      - name: Check examples
        run: npm run examples:check

      - name: Generate API docs
        run: npm run docs:api

      - name: Run database integration gate
        run: npm run test:integration:db

      - name: Verify package archives
        run: npm run pack:dry-run

  publish:
    needs: validate
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Install npm with trusted publishing support
        run: npm install --global npm@11.5.1

      - name: Install dependencies
        run: npm ci --package-lock=true

      - name: Configure temporary npm token when present
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -n "${NODE_AUTH_TOKEN:-}" ]]; then
            umask 077
            printf '%s\n' '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}' > "${RUNNER_TEMP}/npmrc"
            echo "NPM_CONFIG_USERCONFIG=${RUNNER_TEMP}/npmrc" >> "${GITHUB_ENV}"
            echo 'Temporary npm token authentication configured.'
          else
            echo 'No npm token configured; npm trusted publishing must be enabled.'
          fi

      - name: Publish missing package versions
        env:
          RELEASE_PACKAGE: ${{ inputs.release_package }}
          BOOTSTRAP_NPM: ${{ inputs.bootstrap_npm }}
          BOOTSTRAP_CONFIRMATION: ${{ inputs.bootstrap_confirmation }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node tools/verify-from-package-candidates.js --publish
