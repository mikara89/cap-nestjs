name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_servicebus_integration:
        description: 'Run external Azure Service Bus integration gate'
        required: true
        default: false
        type: boolean

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint:check
      - name: Fallow audit
        run: npm run fallow:ci
        continue-on-error: true
      - name: Build
        run: npm run build
      - name: Type-check `libs/cap-nest`
        run: npx tsc -p libs/cap-nest/tsconfig.lib.json --noEmit
      - name: Run tests
        run: npm test --silent
      - name: Run e2e tests
        run: npm run test:e2e -- --runInBand
      - name: Verify package contents
        run: npm run pack:dry-run

  servicebus-integration:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_servicebus_integration }}
    runs-on: ubuntu-latest
    env:
      SERVICEBUS_CONNECTION_STRING: ${{ secrets.SERVICEBUS_CONNECTION_STRING }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Run Azure Service Bus integration gate
        run: npm run test:integration:servicebus
